<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Shion.</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM"
      crossorigin="anonymous"
    />

    <!-- Bootstrap icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />

    <!-- Google fonts : nunito sans, 400 + 700 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- AOS -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <!-- Custom css-->
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Navbar -->
    <nav id="top" class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <div class="">
          <a class="navbar-brand navbar-logo" href="index.html">Shion</a>
        </div>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div
          class="justify-content-end collapse navbar-collapse"
          id="navbarNav"
        >
          <ul class="navbar-nav">
            <li class="nav-item text-center">
              <a class="nav-link navbar-navlinks" href="shop.html">Shop</a>
            </li>
            <div class="nav-spacing">
              <li class="nav-item text-center">
                <a class="nav-link navbar-navlinks" href="contact.html"
                  >Contact</a
                >
              </li>
            </div>
            <div class="row">
              <div class="col">
                <li class="nav-item text-end">
                  <a class="nav-link" href="#"><i class="bi bi-search"></i></a>
                </li>
              </div>
              <div class="col">
                <li class="nav-item text-center">
                  <a class="nav-link" href="#"><i class="bi bi-heart"></i></a>
                </li>
              </div>
              <div class="col">
                <li class="nav-item text-start">
                  <a class="nav-link" href="#"><i class="bi bi-bag"></i></a>
                </li>
              </div>
            </div>
          </ul>
        </div>
      </div>
    </nav>

    <h1 class="text-center pt-90">Contact</h1>
    <div class="container">
      <div class="row">
        <div class="col d-none d-lg-block">
          <div class="container p-5">
            <div
              class="container p-2 d-flex justify-content-end align-items-center"
            >
              <img class="contact-img" src="./images/contact.jpg" />
            </div>
          </div>
        </div>
        <div class="col">
          <!-- Form -->
          <div class="container p-5">
            <div class="pb-80">
              <form>
                <div class="container p-2">
                  <label for="name" class="contact-label p-2">Name</label><br />
                  <input
                    class="contact-input"
                    type="text"
                    id="name"
                    name="fname"
                  /><br />
                </div>
                <div class="container p-2">
                  <label for="email" class="contact-label p-2">Email</label
                  ><br />
                  <input
                    class="contact-input"
                    type="email"
                    id="email"
                    name="email"
                  />
                </div>
                <div class="container p-2">
                  <label for="message" class="contact-label p-2">Message</label
                  ><br />
                  <textarea
                    class="contact-input"
                    name="message"
                    id="message"
                    placeholder="Write your message here"
                    cols="30"
                    rows="5"
                  >
                  </textarea>
                </div>
                <div class="container p-2">
                  <input
                    type="submit"
                    class="btn-black btn-long"
                    value="Submit"
                  />
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <div data-aos="fade-up" data-aos-duration="900" class="container">
        <p class="logo">Shion</p>
        <div class="row row-cols-auto row-spacing">
          <div class="col footer-col">
            <a
              class="btn-underline display-block pb-28"
              href="contact.html#top"
            >
              Back to top <i class="bi bi-arrow-up"></i>
            </a>
          </div>
          <div class="col footer-col">
            <a class="btn-underline display-block pb-28" href="shop.html"
              >Shop</a
            >
          </div>
          <div class="col footer-col pl-24 pr-24">
            <a class="btn-underline display-block pb-28" href="contact.html"
              >Contact</a
            >
          </div>
        </div>
        <p class="pt-40 pb-76">&copy 2023 Lexi Tian. All rights reserved.</p>
      </div>
    </footer>

    <!-- Bootstrap JS -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
      crossorigin="anonymous"
    ></script>

    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>
  </body>
</html>
